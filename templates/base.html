<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page_desc | default(site_desc) }}" />
  <title>{% block title %}{{ site_title }}{% endblock %}</title>

  <!-- Fonts: Playfair Display for headings, DM Sans for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ base_url }}/assets/css/style.css" />

  <!-- Security headers (meta-tag equivalents for static hosting) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  {% block head %}{% endblock %}
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ base_url }}/" class="site-logo">
        <span class="logo-icon">&#9650;</span>
        <span class="logo-text">{{ site_title }}</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="{{ base_url }}/">Recipes</a>
        <a href="{{ base_url }}/tags/">Tags</a>
      </nav>
    </div>
  </header>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site_title }} &mdash; built with Python &amp; love.</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
