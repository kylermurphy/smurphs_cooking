<header class="site-header">
  <nav class="nav" aria-label="Main navigation">
    <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="{{ site.title }} home">
      <span class="nav-logo-mark">✦</span>
      <span class="nav-logo-text">{{ site.title }}</span>
    </a>

    <ul class="nav-links" role="list">
      <li>
        <a href="{{ '/' | relative_url }}"
           class="nav-link {% if page.url == '/' %}nav-link--active{% endif %}">
          Recipes
        </a>
      </li>
      <li>
        <a href="{{ '/tags' | relative_url }}"
           class="nav-link {% if page.url == '/tags/' or page.url == '/tags' %}nav-link--active{% endif %}">
          Tags
        </a>
      </li>
    </ul>

    <!-- Mobile menu toggle -->
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
      <span></span><span></span><span></span>
    </button>
  </nav>
</header>
